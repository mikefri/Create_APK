<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Convertisseur Web vers APK</title>
    <style>
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #f6f8fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
    width: 100%;
    max-width: 400px;
}
h1 { color: #24292f; font-size: 24px; text-align: center; }
input { 
    width: 100%; 
    padding: 12px; 
    margin: 10px 0; 
    border: 1px solid #d0d7de; 
    border-radius: 6px; 
    box-sizing: border-box; /* Pour que le padding ne dépasse pas */
}
button { 
    width: 100%; 
    background-color: #2da44e; 
    color: white; 
    padding: 12px; 
    border: none; 
    border-radius: 6px; 
    font-weight: 600; 
    cursor: pointer;
    transition: background 0.2s;
}
button:hover { background-color: #2c974b; }
#status { margin-top: 15px; font-size: 14px; text-align: center; color: #57606a; }
    </style>
</head>
<body>
    <h1>Web2APK Generator</h1>
    <p>Transformez votre PWA en fichier APK via GitHub Actions.</p>
    
    <input type="url" id="siteUrl" placeholder="https://votre-pwa.com" required>
    <input type="text" id="appName" placeholder="Nom de l'App (ex: MonApp)">
    <input type="password" id="githubToken" placeholder="Votre GitHub Personal Access Token">
    <p class="info">Le Token est nécessaire pour que le site puisse lancer la compilation sur votre GitHub.</p>
    
    <button onclick="lancerCompilation()">Lancer la fabrication</button>

    <div id="status"></div>

    <script>
        async function lancerCompilation() {
            const url = document.getElementById('siteUrl').value;
            const token = document.getElementById('githubToken').value;
            const status = document.getElementById('status');

            if(!url || !token) return alert("Veuillez remplir l'URL et le Token !");

            status.innerText = "Envoi de la demande à GitHub...";

            // Appel à l'API GitHub pour déclencher le workflow
            const response = await fetch('https://api.github.com/repos/mikefri/Create_AP/dispatches', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: 'build-app',
                    client_payload: { url: url }
                })
            });

            if(response.ok) {
                status.innerText = "✅ C'est parti ! Allez dans l'onglet 'Actions' de votre GitHub pour voir la progression.";
            } else {
                status.innerText = "❌ Erreur : Vérifiez votre Token ou le nom du dépôt.";
            }
        }
    </script>
</body>
</html>
