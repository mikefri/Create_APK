<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Convertir mon site en APK</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    input { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    button { background: #2ea44f; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background: #22863a; }
    #status { margin-top: 20px; padding: 12px; border-radius: 6px; display: none; }
    .ok  { background: #d4edda; color: #155724; }
    .err { background: #f8d7da; color: #721c24; }
    label { font-weight: bold; font-size: 14px; color: #333; }
  </style>
</head>
<body>

  <h2>🚀 Convertir un site en APK Android</h2>

  <label>🔑 Token GitHub</label>
  <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />

  <label>🌐 URL du site à convertir</label>
  <input type="url" id="siteUrl" placeholder="https://mon-site.com" />

  <button onclick="lancerBuild()">Générer l'APK</button>

  <div id="status"></div>

<script>
  async function lancerBuild() {
    const token = document.getElementById('ghToken').value.trim();
    const url = document.getElementById('siteUrl').value.trim();

    if (!token) {
      afficher('❌ Entre ton token GitHub', 'err');
      return;
    }
    if (!url || !url.startsWith('http')) {
      afficher('❌ Entre une URL valide (commence par https://)', 'err');
      return;
    }

    afficher('⏳ Envoi en cours...', 'ok');

    try {
      const response = await fetch('https://api.github.com/repos/mikefri/Create_APK/dispatches', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          event_type: 'build-app',
          client_payload: { url: url, name: 'MonApp' }
        })
      });

      if (response.status === 204) {
        afficher('✅ Build lancé ! Va sur GitHub > Actions pour suivre et télécharger ton APK.', 'ok');
      } else {
        afficher('❌ Erreur ' + response.status + ' — Token invalide ou mauvais username ?', 'err');
      }
    } catch (e) {
      afficher('❌ Erreur réseau : ' + e.message, 'err');
    }
  }

  function afficher(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = type;
    s.style.display = 'block';
  }
</script>

</body>
</html>
