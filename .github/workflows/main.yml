name: Build APK from WebApp

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" \
            > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Dev User, OU=Dev, O=MyOrg, L=Paris, S=IDF, C=FR"

      - name: Init project
        run: |
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"

          python3 << PYEOF
          import subprocess, sys, time, os, threading

          url = os.environ.get('CLEAN_URL', '').rstrip('/')
          manifest = f"{url}/manifest.json"
          print(f"Manifest : {manifest}")

          answers = [
            '\n', '\n', '\n', '\n', '\n', '\n', '\n', '\n', '\n', '\n',
            '\n', '\n', '\n', '\n',
            'release.keystore\n',
            'releasekey\n',
            'password123\n',
            'password123\n',
            'Dev User\n',
            'Dev\n',
            'MyOrg\n',
            'Paris\n',
            'IDF\n',
            'FR\n',
            'yes\n',
            'password123\n',
            'password123\n',
          ]

          proc = subprocess.Popen(
            ['bubblewrap', 'init', f'--manifest={manifest}'],
            stdin=subprocess.PIPE,
            stdout=sys.stdout,
            stderr=sys.stderr,
            text=True,
            bufsize=1
          )

          def send_answers():
            for answer in answers:
              time.sleep(4)
              try:
                proc.stdin.write(answer)
                proc.stdin.flush()
                print(f">> Envoyé : {answer.strip() or '(entrée)'}")
              except:
                break
            for i in range(10):
              time.sleep(3)
              try:
                proc.stdin.write('\n')
                proc.stdin.flush()
              except:
                break

          t = threading.Thread(target=send_answers)
          t.daemon = True
          t.start()
          proc.wait()
          PYEOF
        env:
          CLEAN_URL: ${{ github.event.client_payload.url }}
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Patch twa-manifest.json with keystore passwords
        run: |
          echo "=== Contenu twa-manifest.json ==="
          cat twa-manifest.json

          python3 << 'PYEOF'
          import json, os

          with open('twa-manifest.json', 'r') as f:
              manifest = json.load(f)

          manifest['signingKey']['storePassword'] = os.environ['KEYSTORE_PASSWORD']
          manifest['signingKey']['keyPassword'] = os.environ['KEY_PASSWORD']

          with open('twa-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print("✅ twa-manifest.json patché avec succès")
          PYEOF
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        run: printf "Y\n${{ secrets.KEYSTORE_PASSWORD }}\n${{ secrets.KEY_PASSWORD }}\n" | bubblewrap build
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Sign APK (fallback si non signé)
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ Aucun APK trouvé"
            exit 1
          fi
          echo "APK trouvé : $APK"

          if $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify "$APK" 2>/dev/null; then
            echo "✅ APK déjà signé"
          else
            echo "⚠️ APK non signé, signature manuelle..."
            $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v 4 "$APK" apk-aligned.apk
            $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
              --ks release.keystore \
              --ks-key-alias releasekey \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out apk-signed.apk \
              apk-aligned.apk
            echo "✅ APK signé manuellement"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 7
