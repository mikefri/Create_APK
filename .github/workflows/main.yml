name: Build APK from WebApp
on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (Requis pour Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Compiler l'APK Réel
        run: |
          # On initialise le projet à partir de l'URL reçue
          bubblewrap init --url=${{ github.event.client_payload.url }} --name="${{ github.event.client_payload.name }}" --no-prompt
          
          # On génère l'APK. 
          # Note: Sans clé de signature, il va générer un APK "unsigned" (pour test uniquement)
          bubblewrap build --skipSigning
          
      - name: Téléverser l'APK final
        uses: actions/upload-artifact@v4
        with:
          name: Mon-Application-APK
          path: ./*.apk
