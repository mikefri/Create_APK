name: Build APK from WebApp

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" \
            > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init project
        run: |
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"

          python3 << PYEOF
          import subprocess, sys, time, os, threading

          url = os.environ.get('CLEAN_URL', '').rstrip('/')
          manifest = f"{url}/manifest.json"
          print(f"Manifest : {manifest}")

          # Réponses à toutes les questions de Bubblewrap dans l'ordre
          answers = [
            '\n',        # Domain (valeur du manifest)
            '\n',        # URL path
            '\n',        # Application name
            '\n',        # Short name
            '\n',        # Theme color
            '\n',        # Background color
            '\n',        # Start URL
            '\n',        # Display mode
            '\n',        # Status bar
            '\n',        # Splash screen
            '\n',        # Orientation
            '\n',        # Notifications
            '\n',        # Version
            '\n',        # Version code
            '\n',        # Key store location
            '\n',        # Key name
            'password123\n',  # Key store password
            'password123\n',  # Confirm password
            'Dev User\n',    # First and Last name
            'Dev\n',         # Organizational unit
            'MyOrg\n',       # Organization
            'Paris\n',       # City
            'IDF\n',         # State
            'FR\n',          # Country code
            'yes\n',         # Confirm
            'password123\n', # Key password
            'password123\n', # Confirm key password
          ]

          proc = subprocess.Popen(
            ['bubblewrap', 'init', f'--manifest={manifest}'],
            stdin=subprocess.PIPE,
            stdout=sys.stdout,
            stderr=sys.stderr,
            text=True,
            bufsize=1
          )

          def send_answers():
            for answer in answers:
              time.sleep(4)
              try:
                proc.stdin.write(answer)
                proc.stdin.flush()
                print(f">> Envoyé : {answer.strip() or '(entrée)'}")
              except:
                break
            # Continuer à envoyer des entrées au cas où
            for i in range(10):
              time.sleep(3)
              try:
                proc.stdin.write('\n')
                proc.stdin.flush()
              except:
                break

          t = threading.Thread(target=send_answers)
          t.daemon = True
          t.start()
          proc.wait()
          PYEOF
        env:
          CLEAN_URL: ${{ github.event.client_payload.url }}
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Build APK
        run: bubblewrap build --skipSigning
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Trouver APK
        run: find . -name "*.apk" || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 7
