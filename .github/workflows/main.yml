name: Build APK from WebApp

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          # On affiche le vrai chemin du SDK pour debug
          echo "ANDROID_HOME = $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT = $ANDROID_SDK_ROOT"
          
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "SDK utilisé : $SDK_PATH"
          
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${SDK_PATH}"
          }
          EOF
          
          cat ~/.bubblewrap/config.json

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Init project
        run: |
          # Nettoyage du slash final pour éviter le double //
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"
          MANIFEST_URL="${CLEAN_URL}/manifest.json"
          echo "Manifest URL : $MANIFEST_URL"

          expect -c "
            set timeout 180
            spawn bubblewrap init --manifest=\"${MANIFEST_URL}\"
            expect \"? Domain:\"              { send \"\r\" }
            expect \"? URL path:\"            { send \"\r\" }
            expect \"? Application name:\"    { send \"\r\" }
            expect \"? Short name:\"          { send \"\r\" }
            expect \"? Theme color:\"         { send \"\r\" }
            expect \"? Background color:\"    { send \"\r\" }
            expect \"? Start URL:\"           { send \"\r\" }
            expect \"? Display mode:\"        { send \"\r\" }
            expect \"? Status bar:\"          { send \"\r\" }
            expect \"? Splash screen:\"       { send \"\r\" }
            expect \"? Orientation:\"         { send \"\r\" }
            expect \"? Enable notifications:\" { send \"\r\" }
            expect \"? Version:\"             { send \"\r\" }
            expect \"? Version code:\"        { send \"\r\" }
            expect eof
          "
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Build APK
        run: |
          yes '' | bubblewrap build --skipSigning
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Trouver APK
        run: find . -name "*.apk" 2>/dev/null || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 7
