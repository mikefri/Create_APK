name: Build APK from WebApp

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF

      - name: Init project
        run: |
          yes '' | bubblewrap init \
            --manifest="${{ github.event.client_payload.url }}/manifest.json"
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Build APK
        run: |
          cd twa-app
          yes '' | bubblewrap build --skipSigning
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Trouver APK
        run: find . -name "*.apk" 2>/dev/null || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 7
