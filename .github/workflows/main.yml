name: Build APK from WebApp

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Node + Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          echo "BUBBLEWRAP_SKIP_UPDATE_CHECK=true" >> $GITHUB_ENV

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" \
            > ~/.bubblewrap/config.json
          echo "Config Bubblewrap :"
          cat ~/.bubblewrap/config.json

      - name: Verifier manifest
        run: |
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"
          echo "Manifest URL : ${CLEAN_URL}/manifest.json"
          curl -fsSL "${CLEAN_URL}/manifest.json" | head -50

      - name: Init project via Node script
        run: |
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"

          node << EOF
          const { TwaManifest } = require('@bubblewrap/core');
          const path = require('path');

          async function main() {
            const manifestUrl = new URL('${CLEAN_URL}/manifest.json');
            console.log('Chargement manifest depuis :', manifestUrl.toString());
            const twaManifest = await TwaManifest.fromWebManifestJson(
              manifestUrl,
              await (await fetch(manifestUrl.toString())).json()
            );
            console.log('Manifest chargé avec succès');
          }
          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Init Bubblewrap
        run: |
          CLEAN_URL="${{ github.event.client_payload.url }}"
          CLEAN_URL="${CLEAN_URL%/}"
          
          # Utilise le wrapper Python pour répondre automatiquement
          python3 << 'PYEOF'
          import subprocess, sys, time, os

          proc = subprocess.Popen(
            ['bubblewrap', 'init', f'--manifest={os.environ["CLEAN_URL"]}/manifest.json'],
            stdin=subprocess.PIPE,
            stdout=sys.stdout,
            stderr=sys.stderr,
            text=True
          )
          
          time.sleep(30)
          # Envoie 20 fois Entrée pour répondre à toutes les questions
          for i in range(20):
            try:
              proc.stdin.write('\n')
              proc.stdin.flush()
              time.sleep(2)
            except:
              break
          
          proc.wait()
          sys.exit(proc.returncode)
          PYEOF
        env:
          CLEAN_URL: ${{ github.event.client_payload.url }}

      - name: Build APK
        run: bubblewrap build --skipSigning

      - name: Trouver APK
        run: find . -name "*.apk" || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.run_id }}
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 7
